name: Generate Summaries

on:
  schedule:
    # Weekly: every Sunday at 11pm UTC
    - cron: '0 23 * * 0'
    # Monthly: last day of month at 11pm UTC (runs daily, script checks if last day)
    - cron: '0 23 28-31 * *'
    # Yearly: Dec 31 at 11pm UTC
    - cron: '0 23 31 12 *'
  workflow_dispatch:
    inputs:
      period_type:
        description: 'Summary type to generate'
        required: true
        default: 'weekly'
        type: choice
        options:
          - weekly
          - monthly
          - yearly

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @supabase/supabase-js @anthropic-ai/sdk

      - name: Generate summaries
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERIOD_TYPE: ${{ github.event.inputs.period_type || 'auto' }}
        run: node scripts/generate-summaries.js
